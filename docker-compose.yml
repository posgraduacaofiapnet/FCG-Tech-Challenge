services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fcg_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=ArquiteturaFiap.NET@2026
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'ArquiteturaFiap.NET@2026' -Q 'SELECT 1' -C; else /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'ArquiteturaFiap.NET@2026' -Q 'SELECT 1'; fi"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fcg_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  users-api:
    build:
      context: .
      dockerfile: services/UsersAPI/Dockerfile
    container_name: fcg_users_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=FCGUsersDb;User Id=sa;Password=ArquiteturaFiap.NET@2026;TrustServerCertificate=True;
      - Jwt__Key=zR8pW5vB9yX2mN4qA7L1jK9sT6uE3hG0fD5cX8vB2nN1mQ4wZ7xR0tY3uI6pP9oL
      - Jwt__Issuer=UsersAPI
      - Jwt__Audience=FCG
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
    ports:
      - "5101:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  catalog-api:
    build:
      context: .
      dockerfile: services/CatalogAPI/Dockerfile
    container_name: fcg_catalog_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=FCGCatalogDb;User Id=sa;Password=ArquiteturaFiap.NET@2026;TrustServerCertificate=True;
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - RabbitMq__PaymentProcessedQueue=catalog-payment-processed
    ports:
      - "5102:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payments-api:
    build:
      context: .
      dockerfile: services/PaymentsAPI/Dockerfile
    container_name: fcg_payments_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - RabbitMq__OrderPlacedQueue=payments-order-placed
      - Payments__ForceRejected=false
    ports:
      - "5103:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  notifications-api:
    build:
      context: .
      dockerfile: services/NotificationsAPI/Dockerfile
    container_name: fcg_notifications_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - RabbitMq__UserCreatedQueue=notifications-user-created
      - RabbitMq__PaymentProcessedQueue=notifications-payment-processed
    ports:
      - "5104:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
