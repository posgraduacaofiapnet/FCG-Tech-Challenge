services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fcg_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=ArquiteturaFiap.NET@2026
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'ArquiteturaFiap.NET@2026' -Q 'SELECT 1' -C; else /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'ArquiteturaFiap.NET@2026' -Q 'SELECT 1'; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment the following lines to persist data on the host
    # volumes:
    #   - ./sql_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fcg_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=FCGDb;User Id=sa;Password=ArquiteturaFiap.NET@2026;TrustServerCertificate=True;
      - CHAVE_SECRETA=fgc_tech_challenge
      - ADMIN_PASSWORD=Adm!n123
      - JWT_KEY=zR8pW5vB9yX2mN4qA7L1jK9sT6uE3hG0fD5cX8vB2nN1mQ4wZ7xR0tY3uI6pP9oL
      - JWT_ISSUER=FCG.API
      - JWT_AUDIENCE=FCG.API
    ports:
      - "5169:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
